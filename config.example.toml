[general]
contact_email = "your.name@example.com"
user_agent = "literature-search-assistant/0.1 (mailto:your.name@example.com)"
request_timeout_seconds = 20
max_results_per_source = 20
from_year = 2022
prefer_recent = true
enabled_sources = ["openalex", "crossref"]

[semantic_scholar]
api_key = ""
monthly_search_budget = 250
cache_ttl_days = 30
warning_remaining = 50
cache_only_remaining = 25

[google_scholar]
api_key = ""
endpoint = "https://serpapi.com/search.json"

[web_of_science]
api_key = ""
endpoint = "https://api.clarivate.com/apis/wos-starter/v1/documents"

[llm]
enabled = false
provider = "openai" # openai or deepseek
api_key = ""
model = "gpt-4.1-mini"
endpoint = "https://api.openai.com/v1/responses"
request_timeout_seconds = 45

